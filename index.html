<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitFlow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="container">
      <h1 class="logo">Habit<span>Flow</span></h1>
    </div>
  </header>

  <main>
    <div class="container">

      <!-- Add Habit Form -->
      <section class="add-habit-section">
        <h2>Add a New Habit</h2>
        <form id="addHabitForm" class="add-habit-form">
          <input
            type="text"
            id="habitInput"
            placeholder="e.g. Read 20 minutes"
            autocomplete="off"
            required
          />
          <button type="submit" class="btn btn-primary">Add Habit</button>
        </form>
      </section>

      <!-- Habit List -->
      <section class="habits-section">
        <h2>My Habits</h2>
        <ul id="habitList" class="habit-list">
          <!-- Habit items injected here by app.js -->

          <!-- Example of a single habit item structure:
          <li class="habit-item" data-id="abc123">
            <div class="habit-info">
              <span class="habit-name">Read 20 minutes</span>
            </div>
            <div class="habit-actions">
              <button class="btn-complete" aria-label="Mark complete">✓</button>
              <button class="btn-edit"     aria-label="Edit habit">✏️</button>
              <button class="btn-delete"   aria-label="Delete habit">🗑️</button>
            </div>
          </li>
          -->
        </ul>
        <p class="empty-state" id="emptyState">No habits yet. Add one above to get started.</p>
      </section>

    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 HabitFlow</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
